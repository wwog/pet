<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>云相册 · 时光机 · 小狗人生</title>
<link rel="stylesheet" href="design-system.css" />
<style>
  .nav-bar .title { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .nav-bar .action { color: var(--accent); }
  .nav-bar .action svg { width: 24px; height: 24px; }

  .screen-body { padding: 0 16px 100px; }

  /* 语义搜索栏 —— 惊艳一笔 */
  .semantic-search {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-md);
    padding: 14px; margin-bottom: 16px; transition: border-color 0.15s;
  }
  .semantic-search:focus-within { border-color: var(--accent); }
  .semantic-search .label { font-size: 11px; color: var(--accent-deep); font-weight: 600; letter-spacing: 0.04em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .semantic-search .input-row { display: flex; align-items: center; gap: 8px; }
  .semantic-search input { flex: 1; border: 0; background: transparent; outline: none; font-size: 15px; color: var(--fg); min-height: 32px; }
  .semantic-search input::placeholder { color: var(--muted); }
  .semantic-search .sugg { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .semantic-search .sugg .s { font-size: 11px; color: var(--muted); background: var(--surface-2); padding: 4px 9px; border-radius: var(--r-pill); cursor: pointer; }

  /* 时光回忆录卡 */
  .memory-card {
    background: linear-gradient(135deg, oklch(48% 0.04 50), oklch(35% 0.04 55));
    border-radius: var(--r-md); padding: 16px; margin-bottom: 16px; color: #fff;
    display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden;
  }
  .memory-card .play {
    width: 48px; height: 48px; border-radius: 50%; background: oklch(99% 0.01 80 / 0.2);
    display: grid; place-items: center; flex-shrink: 0; backdrop-filter: blur(4px);
  }
  .memory-card .info .lab { font-size: 11px; opacity: 0.7; letter-spacing: 0.06em; }
  .memory-card .info .t { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .memory-card .info .d { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .memory-card .dur { margin-left: auto; font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 7px 14px; border-radius: var(--r-pill); background: var(--surface);
    border: 1px solid var(--border); font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; white-space: nowrap;
  }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .section-head { display: flex; justify-content: space-between; align-items: center; margin: 4px 4px 10px; }
  .section-head .t { font-size: 13px; font-weight: 600; }
  .section-head .c { font-size: 11px; color: var(--muted); }

  /* AI 标签照片网格 */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 18px; }
  .photo {
    aspect-ratio: 1; border-radius: var(--r-sm); position: relative; overflow: hidden;
    display: grid; place-items: center;
  }
  .photo .tag { position: absolute; bottom: 4px; left: 4px; font-size: 9px; background: oklch(20% 0.02 60 / 0.6); color: #fff; padding: 2px 6px; border-radius: var(--r-pill); letter-spacing: 0.02em; backdrop-filter: blur(4px); }
  .photo .vid { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: oklch(20% 0.02 60 / 0.6); display: grid; place-items: center; }
  .photo .vid svg { color: #fff; }

  /* 时间线 */
  .timeline-item { display: flex; gap: 12px; margin-bottom: 14px; }
  .timeline-item .date { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 36px; flex-shrink: 0; padding-top: 2px; }
  .timeline-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
  .timeline-item .content { flex: 1; }
  .timeline-item .content .ev { font-size: 13px; font-weight: 500; }
  .timeline-item .content .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="device">
  <div class="island"></div>
  <div class="screen">
    <div class="status-bar">
      <span>9:41</span>
      <span class="right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="1"/><rect x="4" y="4" width="3" height="7" rx="1"/><rect x="8" y="2" width="3" height="9" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2.5c2 0 3.8.8 5.2 2L14 3.4C12.4 1.8 10.3 1 8 1S3.6 1.8 2 3.4l.8 1.1C4.2 3.3 6 2.5 8 2.5z"/><path d="M8 5.5c1.2 0 2.3.5 3.1 1.3l.8-1.1C11 4.6 9.5 4 8 4s-3 .6-3.9 1.7l.8 1.1C5.7 6 6.8 5.5 8 5.5z"/><circle cx="8" cy="9" r="1.5"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="19" height="9" rx="2" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" opacity="0.4"/></svg>
      </span>
    </div>

    <div class="nav-bar">
      <a class="action" href="tab-briefing.html" data-od-id="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
      <span class="title" data-od-id="page-title">时光机</span>
      <a class="action" href="#" data-od-id="upload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg></a>
    </div>

    <div class="screen-body">
      <!-- 语义搜索 —— 惊艳一笔 -->
      <div class="semantic-search" data-od-id="semantic-search">
        <div class="label"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 8l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> AI 语义搜索</div>
        <div class="input-row">
          <input type="text" placeholder="描述一个瞬间，比如：去年冬天在公园接飞盘" data-od-id="search-input" />
        </div>
        <div class="sugg">
          <span class="s">开心的表情</span>
          <span class="s">睡觉</span>
          <span class="s">接飞盘</span>
          <span class="s">和爷爷</span>
          <span class="s">呕吐时刻</span>
        </div>
      </div>

      <!-- 时光回忆录 -->
      <div class="memory-card" data-od-id="memory-card">
        <div class="play"><svg width="20" height="20" viewBox="0 0 20 20" fill="#fff"><path d="M6 4l10 6-10 6V4z"/></svg></div>
        <div class="info">
          <div class="lab">时光回忆录 · 6月</div>
          <div class="t">豆豆的高光 15 秒</div>
          <div class="d">12 个瞬间 · 配乐《暖阳》</div>
        </div>
        <div class="dur">0:15</div>
      </div>

      <div class="filter-row" data-od-id="filter-row">
        <span class="filter-chip active">全部 · 1,284</span>
        <span class="filter-chip">飞盘</span>
        <span class="filter-chip">睡觉</span>
        <span class="filter-chip">开心</span>
        <span class="filter-chip">委屈</span>
        <span class="filter-chip">呕吐</span>
      </div>

      <div class="section-head"><span class="t">本周精选</span><span class="c">AI 已剔除 23 张模糊/重复</span></div>
      <div class="photo-grid" data-od-id="photo-grid">
        <div class="photo" style="background:linear-gradient(135deg,#e8c9a0,#d8a878)"><span class="tag">接飞盘</span><div class="vid"><svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><path d="M2 1l5 3.5L2 8z"/></svg></div></div>
        <div class="photo" style="background:linear-gradient(135deg,#c9e6d8,#a8d0b8)"><span class="tag">开心</span></div>
        <div class="photo" style="background:linear-gradient(135deg,#a87850,#8a6a4a)"><span class="tag">睡觉</span></div>
        <div class="photo" style="background:linear-gradient(135deg,#f0d8b8,#e8c9a0)"><span class="tag">握手</span></div>
        <div class="photo" style="background:linear-gradient(135deg,#3a2a1a,#5a4030)"><span class="tag">夜间</span><div class="vid"><svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><path d="M2 1l5 3.5L2 8z"/></svg></div></div>
        <div class="photo" style="background:linear-gradient(135deg,#d8b89a,#c9a878)"><span class="tag">散步</span></div>
        <div class="photo" style="background:linear-gradient(135deg,#b8d0e0,#a0bcd0)"><span class="tag">游泳</span><div class="vid"><svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><path d="M2 1l5 3.5L2 8z"/></svg></div></div>
        <div class="photo" style="background:linear-gradient(135deg,#e8a878,#d89868)"><span class="tag">吃饭</span></div>
        <div class="photo" style="background:linear-gradient(135deg,#c9a878,#a88858)"><span class="tag">撒娇</span></div>
      </div>

      <div class="section-head"><span class="t">时光轴</span><span class="c">最近活动</span></div>
      <div data-od-id="timeline">
        <div class="timeline-item">
          <div class="date">7.06</div><div class="dot"></div>
          <div class="content"><div class="ev">爷爷 老张 上传了 3 张照片</div><div class="meta">公园散步 · 含 1 段视频</div></div>
        </div>
        <div class="timeline-item">
          <div class="date">7.04</div><div class="dot" style="background:var(--danger)"></div>
          <div class="content"><div class="ev">奶爸 阿哲 记录了呕吐时刻</div><div class="meta">已同步至健康档案 · AI 建议观察</div></div>
        </div>
        <div class="timeline-item">
          <div class="date">7.01</div><div class="dot" style="background:var(--mint)"></div>
          <div class="content"><div class="ev">6月回忆录已生成</div><div class="meta">12 个高光瞬间 · 15 秒</div></div>
        </div>
      </div>
    </div>

    <nav class="tab-bar" data-od-id="tab-bar">
      <a href="tab-briefing.html" data-od-id="tab-briefing"><svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 3l9 7v10a2 2 0 0 1-2 2h-4v-7h-6v7H6a2 2 0 0 1-2-2V10l9-7z"/></svg>简报</a>
      <a href="tab-ai-chat.html" data-od-id="tab-chat"><svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-5 4V8a2 2 0 0 1 1-2z"/></svg>AI</a>
      <a class="active" href="profile-me.html" data-od-id="tab-me"><svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="13" cy="9" r="4"/><path d="M5 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>我的</a>
    </nav>

    <div class="home-bar"></div>
  </div>
</div>

<script>
  document.querySelectorAll('.filter-chip').forEach(function(el){
    el.addEventListener('click', function(){
      document.querySelectorAll('.filter-chip').forEach(function(o){ o.classList.remove('active'); });
      el.classList.add('active');
    });
  });
  document.querySelectorAll('.sugg .s').forEach(function(el){
    el.addEventListener('click', function(){
      var inp = document.querySelector('[data-od-id="search-input"]');
      inp.value = el.textContent; inp.focus();
    });
  });
</script>
</body>
</html>
