<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI对话·宠物翻译官 · 小狗人生</title>
<link rel="stylesheet" href="design-system.css" />
<style>
  .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .nav-bar .sub { font-size: 11px; color: var(--muted); }
  .nav-bar svg { color: var(--fg); }

  /* 模式切换 */
  .mode-row { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
  .mode-row::-webkit-scrollbar { display: none; }
  .mode-chip {
    flex-shrink: 0; padding: 8px 14px; border-radius: var(--r-pill); background: var(--surface);
    border: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mode-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mode-chip svg { width: 14px; height: 14px; }

  /* 对话区 */
  .chat-body { flex: 1; overflow-y: auto; padding: 4px 16px 140px; }
  .chat-body::-webkit-scrollbar { display: none; }
  .msg { margin-bottom: 14px; display: flex; flex-direction: column; max-width: 80%; }
  .msg.ai { align-items: flex-start; }
  .msg.me { align-items: flex-end; margin-left: auto; }
  .bubble { padding: 12px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
  .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 6px; }
  .msg.me .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 6px; }
  .msg .role { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.04em; }
  .msg .time { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .ai-av { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: inline-grid; place-items: center; vertical-align: middle; margin-right: 6px; }

  /* 紧急分诊卡 —— 惊艳一笔 */
  .triage-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
    padding: 14px; margin-top: 8px; border-left: 3px solid var(--danger);
  }
  .triage-card.yellow { border-left-color: var(--warn); }
  .triage-card.green { border-left-color: var(--mint); }
  .triage-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .triage-level { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: var(--r-pill); letter-spacing: 0.04em; }
  .triage-level.red { background: oklch(93% 0.06 25); color: var(--danger); }
  .triage-level.yellow { background: oklch(93% 0.06 70); color: oklch(50% 0.12 70); }
  .triage-level.green { background: var(--mint-soft); color: oklch(42% 0.1 165); }
  .triage-card .t { font-size: 13px; font-weight: 600; }
  .triage-card .d { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; }
  .triage-actions { display: flex; gap: 8px; margin-top: 10px; }
  .triage-actions a { flex: 1; text-align: center; font-size: 12px; font-weight: 600; padding: 8px; border-radius: var(--r-pill); text-decoration: none; }
  .triage-actions .nav { background: var(--danger); color: #fff; }
  .triage-actions .call { background: var(--surface-2); color: var(--fg); border: 1px solid var(--border); }

  .typing { display: inline-flex; gap: 3px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.4s infinite both; }
  .typing span:nth-child(2){ animation-delay: 0.2s; }
  .typing span:nth-child(3){ animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{ opacity:0.2 } 40%{ opacity:1 } }

  /* 输入栏 */
  .input-bar {
    position: absolute; bottom: 84px; left: 0; right: 0; padding: 10px 16px;
    background: oklch(99% 0.006 80 / 0.92); backdrop-filter: blur(12px); border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  .input-bar .attach { width: 36px; height: 36px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; flex-shrink: 0; color: var(--muted); }
  .input-bar input { flex: 1; border: 1px solid var(--border); border-radius: var(--r-pill); background: var(--surface); padding: 0 16px; height: 40px; font-size: 14px; outline: none; }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar .send { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: 0; display: grid; place-items: center; flex-shrink: 0; cursor: pointer; }
  .input-bar .send svg { color: #fff; }
</style>
</head>
<body>
<div class="device">
  <div class="island"></div>
  <div class="screen">
    <div class="status-bar">
      <span>9:41</span>
      <span class="right">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="6" width="3" height="5" rx="1"/><rect x="4" y="4" width="3" height="7" rx="1"/><rect x="8" y="2" width="3" height="9" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2.5c2 0 3.8.8 5.2 2L14 3.4C12.4 1.8 10.3 1 8 1S3.6 1.8 2 3.4l.8 1.1C4.2 3.3 6 2.5 8 2.5z"/><path d="M8 5.5c1.2 0 2.3.5 3.1 1.3l.8-1.1C11 4.6 9.5 4 8 4s-3 .6-3.9 1.7l.8 1.1C5.7 6 6.8 5.5 8 5.5z"/><circle cx="8" cy="9" r="1.5"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="19" height="9" rx="2" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" opacity="0.4"/></svg>
      </span>
    </div>

    <div class="nav-bar">
      <a class="back" href="tab-briefing.html" data-od-id="back"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M14 5l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
      <div style="text-align:center;flex:1">
        <div class="title" data-od-id="page-title">宠物翻译官</div>
        <div class="sub">豆豆 · 金毛 · AI 实时解读</div>
      </div>
      <a class="back" href="#" data-od-id="history" style="opacity:0">·</a>
    </div>

    <div class="mode-row" data-od-id="mode-row">
      <span class="mode-chip active" data-od-id="mode-triage"><svg viewBox="0 0 14 14" fill="none"><path d="M7 2l5 9H2L7 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 6v2M7 9.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>紧急分诊</span>
      <span class="mode-chip" data-od-id="mode-behavior">行为解读</span>
      <span class="mode-chip" data-od-id="mode-pet">🐾 拟人化</span>
    </div>

    <div class="chat-body" data-od-id="chat-body">
      <div class="msg ai" data-od-id="msg-1">
        <div class="role"><span class="ai-av"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" fill="#fff"/></svg></span>宠物翻译官</div>
        <div class="bubble">你好，豆豆的家长。描述一下豆豆现在的症状或行为，我会判断紧急程度并给出建议。也可以上传一段视频让我看看。</div>
        <div class="time">9:38</div>
      </div>

      <div class="msg me" data-od-id="msg-2">
        <div class="bubble">豆豆从半小时前开始反复干呕，吐了两次黄水，精神有点蔫，鼻子发干。</div>
        <div class="time">9:40</div>
      </div>

      <!-- 紧急分诊卡 —— 惊艳一笔 -->
      <div class="msg ai">
        <div class="role"><span class="ai-av"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" fill="#fff"/></svg></span>宠物翻译官</div>
        <div class="bubble">
          综合症状分析，建议尽快就医排查。
          <div class="triage-card" data-od-id="triage-card">
            <div class="triage-head">
              <span class="triage-level red">红色 · 紧急</span>
              <span class="t">疑似胃扩张或异物阻塞</span>
            </div>
            <div class="d">反复干呕 + 黄水 + 精神萎靡是高危信号。就医前：禁食禁水，避免剧烈活动，记录呕吐次数与内容。</div>
            <div class="triage-actions">
              <a class="nav" href="#" data-od-id="nav-hospital">导航至24h急诊</a>
              <a class="call" href="#" data-od-id="call-vet">联系兽医</a>
            </div>
          </div>
        </div>
        <div class="time">9:40 · AI 建议，非诊断</div>
      </div>

      <div class="msg ai" data-od-id="msg-typing">
        <div class="role"><span class="ai-av"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" fill="#fff"/></svg></span>正在为你查找附近急诊医院…</div>
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>
    </div>

    <div class="input-bar" data-od-id="input-bar">
      <div class="attach" data-od-id="attach"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 4v10M4 9h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <input type="text" placeholder="描述症状或上传视频…" data-od-id="msg-input" />
      <button class="send" data-od-id="send"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9l12-5-4 12-3-5-5-2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
    </div>

    <nav class="tab-bar" data-od-id="tab-bar">
      <a href="tab-briefing.html" data-od-id="tab-briefing"><svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 3l9 7v10a2 2 0 0 1-2 2h-4v-7h-6v7H6a2 2 0 0 1-2-2V10l9-7z"/></svg>简报</a>
      <a class="active" href="tab-ai-chat.html" data-od-id="tab-chat"><svg viewBox="0 0 26 26" fill="currentColor"><path d="M5 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-5 4V8a2 2 0 0 1 1-2z"/></svg>AI</a>
      <a href="profile-me.html" data-od-id="tab-me"><svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="13" cy="9" r="4"/><path d="M5 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>我的</a>
    </nav>

    <div class="home-bar"></div>
  </div>
</div>

<script>
  document.querySelectorAll('.mode-chip').forEach(function(el){
    el.addEventListener('click', function(){
      document.querySelectorAll('.mode-chip').forEach(function(o){ o.classList.remove('active'); });
      el.classList.add('active');
    });
  });
</script>
</body>
</html>
