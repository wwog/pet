<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>财务管家 · 小狗人生</title>
<link rel="stylesheet" href="design-system.css" />
<style>
  .nav-bar svg { color: var(--fg); }
  .nav-bar .title { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .nav-bar .action { color: var(--accent); font-size: 14px; font-weight: 600; text-decoration: none; width: auto; }

  .screen-body { padding: 0 16px 100px; }

  /* 月度总览 —— 惊艳一笔 */
  .month-hero { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%); border-radius: var(--r-lg); padding: 20px; color: #fff; margin-bottom: 14px; position: relative; overflow: hidden; }
  .month-hero::before { content:''; position:absolute; top:-30px; right:-20px; width:120px; height:120px; border-radius:50%; background: oklch(99% 0.01 80 / 0.12); }
  .month-hero .m { font-size: 12px; opacity: 0.85; letter-spacing: 0.02em; }
  .month-hero .amt { font-family: var(--font-display); font-size: 38px; font-weight: 700; letter-spacing: -0.02em; margin: 4px 0 2px; font-variant-numeric: tabular-nums; }
  .month-hero .amt .cur { font-size: 18px; opacity: 0.7; }
  .month-hero .delta { font-size: 12px; opacity: 0.9; }
  .month-hero .delta b { font-weight: 700; }
  .month-hero .delta.down { color: oklch(88% 0.08 145); }

  /* 分类饼图 + 图例 */
  .breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; margin-bottom: 14px; }
  .breakdown .h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .breakdown .h .t { font-size: 14px; font-weight: 700; }
  .breakdown .h .toggle { font-size: 11px; color: var(--muted); }
  .pie-row { display: flex; align-items: center; gap: 18px; }
  .pie { width: 110px; height: 110px; flex-shrink: 0; position: relative; }
  .pie svg { transform: rotate(-90deg); }
  .pie .center { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; }
  .pie .center .v { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .pie .center .l { font-size: 9px; color: var(--muted); }
  .legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend .item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .legend .item .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend .item .n { flex: 1; }
  .legend .item .v { font-family: var(--font-mono); font-weight: 600; font-variant-numeric: tabular-nums; }
  .legend .item .p { font-size: 11px; color: var(--muted); margin-left: 4px; }

  /* 趋势条 */
  .trend-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; margin-bottom: 14px; }
  .trend-card .h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .trend-card .h .t { font-size: 14px; font-weight: 700; }
  .trend-card .h .avg { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .trend-bars { display: flex; align-items: flex-end; gap: 6px; height: 70px; }
  .trend-bar { flex: 1; background: var(--accent-soft); border-radius: 3px 3px 0 0; min-height: 4px; position: relative; }
  .trend-bar.cur { background: var(--accent); }
  .trend-bar .lbl { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--muted); font-family: var(--font-mono); }
  .trend-axis { margin-top: 22px; }

  /* 交易流水 */
  .section-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; margin: 4px 4px 10px; }
  .tx-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; }
  .tx { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-bottom: 1px solid var(--border); }
  .tx:last-child { border-bottom: 0; }
  .tx .ic { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
  .tx .ic.med { background: oklch(93% 0.05 25); color: var(--danger); }
  .tx .ic.food { background: var(--accent-soft); color: var(--accent-deep); }
  .tx .ic.toy { background: var(--mint-soft); color: oklch(42% 0.1 165); }
  .tx .ic.ins { background: oklch(92% 0.02 240); color: var(--info); }
  .tx .info { flex: 1; }
  .tx .info .n { font-size: 14px; font-weight: 600; }
  .tx .info .m { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .tx .amt { font-family: var(--font-mono); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 14px; }
  .tx .amt.neg { color: var(--fg); }
  .tx .amt.pos { color: var(--success); }
</style>
</head>
<body>
<div class="device">
  <div class="island"></div>
  <div class="screen">

        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2.5c2 0 3.8.8 5.2 2L14 3.4C12.4 1.8 10.3 1 8 1S3.6 1.8 2 3.4l.8 1.1C4.2 3.3 6 2.5 8 2.5z"/><path d="M8 5.5c1.2 0 2.3.5 3.1 1.3l.8-1.1C11 4.6 9.5 4 8 4s-3 .6-3.9 1.7l.8 1.1C5.7 6 6.8 5.5 8 5.5z"/><circle cx="8" cy="9" r="1.5"/></svg>

      <div class="breakdown" data-od-id="breakdown">

              <circle cx="55" cy="55" r="42" fill="none" stroke="var(--danger)" stroke-width="14" stroke-dasharray="137 264" stroke-linecap="butt"/>
              <circle cx="55" cy="55" r="42" fill="none" stroke="var(--accent)" stroke-width="14" stroke-dasharray="79 264" stroke-dashoffset="-137"/>
              <circle cx="55" cy="55" r="42" fill="none" stroke="var(--mint)" stroke-width="14" stroke-dasharray="32 264" stroke-dashoffset="-216"/>

            <div class="item"><span class="dot" style="background:var(--mint)"></span><span class="n">玩具</span><span class="v">¥150</span><span class="p">12%</span></div>

      </div>

      <div class="trend-card" data-od-id="trend">

        <div class="trend-bars">

        <div class="trend-axis" style="display:flex; justify-content:space-between; font-size:9px; color:var(--muted); font-family:var(--font-mono);"><span>2月</span><span>3月</span><span>4月</span><span>5月</span><span>6月</span><span>7月</span></div>

      <div class="section-label">近期交易</div>

          <div class="info"><div class="n">皇家成犬粮 12kg</div><div class="m">7.03 · 京东自营</div></div>
          <span class="amt neg">−¥289</span>

        <div class="tx" data-od-id="tx-3">

    <nav class="tab-bar" data-od-id="tab-bar">
